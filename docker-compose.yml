services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    entrypoint: /usr/local/bin/entrypoint.sh
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: legacy_delivery
      DB_USERNAME: legacy_user
      DB_PASSWORD: legacy_pass
      CACHE_DRIVER: redis
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: legacy_delivery
      MYSQL_USER: legacy_user
      MYSQL_PASSWORD: legacy_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  db_data: